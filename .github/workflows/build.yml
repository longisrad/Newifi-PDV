name: Build Padavan NEWIFI3

on:
  workflow_dispatch: # Cho phép nhấn nút chạy thủ công trên giao diện GitHub Actions
  push:
    branches:
      - master # Tự động chạy khi bạn push code lên nhánh master

jobs:
  build:
    runs-on: ubuntu-22.04 # Môi trường Ubuntu 22.04 ổn định
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Khởi tạo môi trường biên dịch
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
            cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
            pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget \
            libc6-dev-i386

      - name: Thiết lập Bộ nhớ đệm (Cache) cho Toolchain
        id: cache-toolchain
        uses: actions/cache@v4 # Sử dụng cache v4 để lưu trữ bộ biên dịch
        with:
          path: |
            toolchain/out
            toolchain/toolchain-3.4.x
            toolchain-mipsel/toolchain-3.4.x
          key: ${{ runner.os }}-padavan-toolchain-v2 # Khóa định danh cho cache

      - name: Biên dịch Toolchain thủ công (Chỉ chạy nếu KHÔNG CÓ CACHE - mất 40-60 phút)
        if: steps.cache-toolchain.outputs.cache-hit != 'true' # Bỏ qua bước này nếu đã tìm thấy cache
        run: |
          # 1. Định vị thư mục Toolchain thực tế ở thư mục gốc
          if [ -d "toolchain" ]; then
              cd toolchain
          elif [ -d "toolchain-mipsel" ]; then
              cd toolchain-mipsel
          else
              echo "LỖI: Không tìm thấy thư mục Toolchain trong kho nguồn!"
              exit 1
          fi
          
          # 2. Cấp quyền chạy cho các kịch bản biên dịch trong thư mục
          chmod +x clean_sources build_toolchain clean_sources.sh build_toolchain.sh 2>/dev/null || true
          
          # 3. Tiến hành dọn dẹp mã nguồn cũ
          if [ -f "clean_sources" ]; then
              ./clean_sources
          elif [ -f "clean_sources.sh" ]; then
              sh clean_sources.sh
          fi
          
          # 4. Kích hoạt tiến trình tự dựng (build) Toolchain cho chip MIPSLE
          if [ -f "build_toolchain" ]; then
              ./build_toolchain
          elif [ -f "build_toolchain.sh" ]; then
              sh build_toolchain.sh
          else
              echo "LỖI: Không tìm thấy tệp lệnh build_toolchain!"
              exit 1
          fi

      - name: Tiến hành dọn dẹp và Biên dịch ROM
        run: |
          # Sao chép cấu hình build.config từ thư mục gốc đè vào file mẫu của board và file đích .config
          cp -f build.config trunk/configs/templates/NEWIFI3.config
          cp -f build.config trunk/.config
          
          cd trunk
          
          # 1. Khử sạch ký tự xuống dòng Windows (CRLF) nếu có
          sed -i 's/\r$//' clear_tree build_firmware_modify build_firmware clear_tree.sh 2>/dev/null || true
          
          # 2. Tự động sửa lỗi chính tả DEF_OVC_CIPH_LIST của tác giả trong defaults.c
          sed -i 's/DEF_OVC_CIPH_LIST/DEF_OVPNC_CIPH_LIST/g' user/shared/defaults.c 2>/dev/null || true
          
          # 3. Cấp quyền thực thi cứng cho các kịch bản biên dịch
          chmod +x clear_tree build_firmware_modify build_firmware clear_tree.sh 2>/dev/null || true
          
          # 4. Tiến hành dọn dẹp cây biên dịch cũ
          if [ -f "clear_tree" ]; then
              ./clear_tree
          elif [ -f "clear_tree.sh" ]; then
              sh clear_tree.sh
          fi
          
          # 5. Tìm kiếm động tệp biên dịch bắt đầu bằng build_firmware* để chạy
          build_script=$(find . -maxdepth 1 -name "build_firmware*" | head -n 1)
          if [ -n "$build_script" ]; then
              echo "Đã tìm thấy tập lệnh biên dịch ROM: $build_script"
              chmod +x "$build_script"
              $build_script NEWIFI3
          else
              echo "LỖI: Không tìm thấy tập lệnh biên dịch ROM!"
              echo "--- Danh sách file trong thư mục trunk để chẩn đoán ---"
              ls -la
              exit 1
          fi

      - name: Đóng gói và Upload Firmware lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Padavan_NEWIFI3_Firmware
          path: trunk/images/*.trx
